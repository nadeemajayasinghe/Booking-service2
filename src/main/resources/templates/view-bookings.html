<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Bookings - Vehicle Rental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-links a {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .filter-group button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }

        .filter-group button:hover {
            background: #764ba2;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
        }

        .stat-card .label {
            font-size: 1em;
            opacity: 0.9;
        }

        .bookings-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            font-weight: 600;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .status-completed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-in_progress {
            background: #cce5ff;
            color: #004085;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .btn-action {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .btn-view {
            background: #17a2b8;
            color: white;
        }

        .btn-cancel {
            background: #dc3545;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        .detail-row {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-row label {
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 All Bookings</h1>
            <p>View and manage vehicle rental bookings</p>
        </div>

        <div class="nav-links">
            <a href="/">← Back to Home</a>
            <a href="/booking-form">+ New Booking</a>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="filterEmail">Customer Email</label>
                <input type="email" id="filterEmail" placeholder="Search by email">
            </div>
            <div class="filter-group">
                <label for="filterStatus">Status</label>
                <select id="filterStatus">
                    <option value="">All Status</option>
                    <option value="PENDING">Pending</option>
                    <option value="CONFIRMED">Confirmed</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="CANCELLED">Cancelled</option>
                </select>
            </div>
            <div class="filter-group">
                <button onclick="loadBookings()">🔍 Search</button>
            </div>
            <div class="filter-group">
                <button onclick="clearFilters()">↻ Reset</button>
            </div>
        </div>

        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="number" id="totalBookings">0</div>
                <div class="label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="number" id="pendingBookings">0</div>
                <div class="label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="number" id="confirmedBookings">0</div>
                <div class="label">Confirmed</div>
            </div>
            <div class="stat-card">
                <div class="number" id="completedBookings">0</div>
                <div class="label">Completed</div>
            </div>
        </div>

        <div id="loadingSpinner" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading bookings...</p>
        </div>

        <div class="bookings-container" id="bookingsContainer">
            <!-- Table will be populated here -->
        </div>
    </div>

    <!-- Booking Details Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Booking Details</h2>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody">
                <!-- Details will be populated here -->
            </div>
        </div>
    </div>

    <script>
        let allBookings = [];

        // Load bookings on page load
        window.addEventListener('DOMContentLoaded', loadBookings);

        async function loadBookings() {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('bookingsContainer').innerHTML = '';

            try {
                let url = 'http://localhost:8081/api/bookings';
                
                const filterEmail = document.getElementById('filterEmail').value;
                const filterStatus = document.getElementById('filterStatus').value;

                if (filterEmail) {
                    url = `http://localhost:8081/api/bookings/customer/${encodeURIComponent(filterEmail)}`;
                } else if (filterStatus) {
                    url = `http://localhost:8081/api/bookings/status/${filterStatus}`;
                }

                const response = await fetch(url);
                const bookings = await response.json();

                allBookings = bookings;
                displayBookings(bookings);
                updateStats(bookings);
            } catch (error) {
                console.error('Error loading bookings:', error);
                document.getElementById('bookingsContainer').innerHTML = 
                    '<div class="empty-state"><h3>Error loading bookings</h3><p>Please try again later.</p></div>';
            } finally {
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        }

        function displayBookings(bookings) {
            const container = document.getElementById('bookingsContainer');

            if (bookings.length === 0) {
                container.innerHTML = 
                    '<div class="empty-state"><h3>No bookings found</h3><p>Start by creating a new booking!</p></div>';
                return;
            }

            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Vehicle</th>
                            <th>Pickup Date</th>
                            <th>Return Date</th>
                            <th>Days</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bookings.map(booking => `
                            <tr>
                                <td>#${booking.id}</td>
                                <td>
                                    <strong>${booking.customerName}</strong><br>
                                    <small>${booking.customerEmail}</small>
                                </td>
                                <td>${booking.vehicleName}</td>
                                <td>${formatDate(booking.pickupDate)}</td>
                                <td>${formatDate(booking.returnDate)}</td>
                                <td>${booking.numberOfDays}</td>
                                <td>$${booking.totalAmount.toFixed(2)}</td>
                                <td>
                                    <span class="status-badge status-${booking.status.toLowerCase()}">
                                        ${booking.status}
                                    </span>
                                </td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="btn-action btn-view" onclick="viewBooking(${booking.id})">
                                            👁️ View
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = table;
        }

        function updateStats(bookings) {
            document.getElementById('totalBookings').textContent = bookings.length;
            document.getElementById('pendingBookings').textContent = 
                bookings.filter(b => b.status === 'PENDING').length;
            document.getElementById('confirmedBookings').textContent = 
                bookings.filter(b => b.status === 'CONFIRMED').length;
            document.getElementById('completedBookings').textContent = 
                bookings.filter(b => b.status === 'COMPLETED').length;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        async function viewBooking(bookingId) {
            try {
                const response = await fetch(`http://localhost:8081/api/bookings/${bookingId}`);
                const booking = await response.json();

                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="detail-row">
                        <label>Booking ID:</label>
                        <div>#${booking.id}</div>
                    </div>
                    <div class="detail-row">
                        <label>Status:</label>
                        <div>
                            <span class="status-badge status-${booking.status.toLowerCase()}">
                                ${booking.status}
                            </span>
                        </div>
                    </div>
                    <div class="detail-row">
                        <label>Vehicle:</label>
                        <div>${booking.vehicleName} (ID: ${booking.vehicleId})</div>
                    </div>
                    <div class="detail-row">
                        <label>Customer Name:</label>
                        <div>${booking.customerName}</div>
                    </div>
                    <div class="detail-row">
                        <label>Customer Email:</label>
                        <div>${booking.customerEmail}</div>
                    </div>
                    <div class="detail-row">
                        <label>Customer Phone:</label>
                        <div>${booking.customerPhone}</div>
                    </div>
                    <div class="detail-row">
                        <label>License Number:</label>
                        <div>${booking.licenseNumber}</div>
                    </div>
                    <div class="detail-row">
                        <label>Pickup Date:</label>
                        <div>${formatDate(booking.pickupDate)}</div>
                    </div>
                    <div class="detail-row">
                        <label>Return Date:</label>
                        <div>${formatDate(booking.returnDate)}</div>
                    </div>
                    <div class="detail-row">
                        <label>Pickup Location:</label>
                        <div>${booking.pickupLocation}</div>
                    </div>
                    <div class="detail-row">
                        <label>Return Location:</label>
                        <div>${booking.returnLocation}</div>
                    </div>
                    <div class="detail-row">
                        <label>Number of Days:</label>
                        <div>${booking.numberOfDays}</div>
                    </div>
                    <div class="detail-row">
                        <label>Price Per Day:</label>
                        <div>$${booking.pricePerDay.toFixed(2)}</div>
                    </div>
                    <div class="detail-row">
                        <label>Total Amount:</label>
                        <div style="font-size: 1.3em; color: #667eea; font-weight: bold;">
                            $${booking.totalAmount.toFixed(2)}
                        </div>
                    </div>
                    ${booking.specialRequests ? `
                        <div class="detail-row">
                            <label>Special Requests:</label>
                            <div>${booking.specialRequests}</div>
                        </div>
                    ` : ''}
                    <div class="detail-row">
                        <label>Created At:</label>
                        <div>${new Date(booking.createdAt).toLocaleString()}</div>
                    </div>
                `;

                document.getElementById('bookingModal').style.display = 'block';
            } catch (error) {
                console.error('Error loading booking details:', error);
                alert('Failed to load booking details');
            }
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        function clearFilters() {
            document.getElementById('filterEmail').value = '';
            document.getElementById('filterStatus').value = '';
            loadBookings();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('bookingModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
