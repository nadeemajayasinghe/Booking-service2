<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Booking - Vehicle Rental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            min-height: 100vh;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1em;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-links a {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .form-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group small {
            color: #999;
            font-size: 0.85em;
            margin-top: 4px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .price-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .price-info h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .price-info .amount {
            font-size: 2em;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .required {
            color: #dc3545;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Create New Booking</h1>
            <p>Fill in the details below to book your vehicle</p>
        </div>

        <div class="nav-links">
            <a href="/">← Back to Home</a>
            <a href="/bookings">View All Bookings</a>
        </div>

        <div id="alertBox" class="alert"></div>
        <div id="loadingSpinner" class="loading">
            <div class="spinner"></div>
            <p>Processing your booking...</p>
        </div>

        <form id="bookingForm">
            <!-- Vehicle Information -->
            <div class="form-section">
                <h2 class="section-title">🚘 Vehicle Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="vehicleId">Vehicle ID <span class="required">*</span></label>
                        <input type="number" id="vehicleId" name="vehicleId" required min="1">
                        <small>Enter the vehicle ID from the catalog</small>
                    </div>
                    <div class="form-group">
                        <label for="vehicleName">Vehicle Name <span class="required">*</span></label>
                        <input type="text" id="vehicleName" name="vehicleName" required
                            placeholder="e.g., Toyota Camry 2024">
                    </div>
                    <div class="form-group">
                        <label for="pricePerDay">Price Per Day ($) <span class="required">*</span></label>
                        <input type="number" id="pricePerDay" name="pricePerDay" required min="1" step="0.01"
                            placeholder="50.00">
                    </div>
                </div>
            </div>

            <!-- Customer Information -->
            <div class="form-section">
                <h2 class="section-title">👤 Customer Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="customerName">Full Name <span class="required">*</span></label>
                        <input type="text" id="customerName" name="customerName" required placeholder="John Doe"
                            minlength="2" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="customerEmail">Email Address <span class="required">*</span></label>
                        <input type="email" id="customerEmail" name="customerEmail" required
                            placeholder="john.doe@example.com">
                    </div>
                    <div class="form-group">
                        <label for="customerPhone">Phone Number <span class="required">*</span></label>
                        <input type="tel" id="customerPhone" name="customerPhone" required placeholder="+1-234-567-8900"
                            pattern="[0-9+\-\s()]+">
                    </div>
                    <div class="form-group">
                        <label for="licenseNumber">Driver's License Number <span class="required">*</span></label>
                        <input type="text" id="licenseNumber" name="licenseNumber" required placeholder="DL123456789">
                    </div>
                </div>
            </div>

            <!-- Booking Details -->
            <div class="form-section">
                <h2 class="section-title">📅 Booking Details</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="pickupDate">Pickup Date <span class="required">*</span></label>
                        <input type="date" id="pickupDate" name="pickupDate" required>
                    </div>
                    <div class="form-group">
                        <label for="returnDate">Return Date <span class="required">*</span></label>
                        <input type="date" id="returnDate" name="returnDate" required>
                    </div>
                    <div class="form-group">
                        <label for="pickupLocation">Pickup Location <span class="required">*</span></label>
                        <input type="text" id="pickupLocation" name="pickupLocation" required
                            placeholder="123 Main St, City, State">
                    </div>
                    <div class="form-group">
                        <label for="returnLocation">Return Location <span class="required">*</span></label>
                        <input type="text" id="returnLocation" name="returnLocation" required
                            placeholder="123 Main St, City, State">
                    </div>
                    <div class="form-group full-width">
                        <label for="specialRequests">Special Requests (Optional)</label>
                        <textarea id="specialRequests" name="specialRequests"
                            placeholder="Any special requirements or requests..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Price Summary -->
            <div class="price-info" id="priceInfo" style="display: none;">
                <h3>Total Booking Price</h3>
                <div class="amount" id="totalAmount">$0.00</div>
                <p id="daysInfo">0 days rental</p>
            </div>

            <!-- Submit Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-primary">
                    ✓ Confirm Booking
                </button>
                <button type="reset" class="btn-secondary">
                    ↻ Reset Form
                </button>
            </div>
        </form>
    </div>

    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('pickupDate').setAttribute('min', today);
        document.getElementById('returnDate').setAttribute('min', today);

        // Calculate total price when dates or price change
        function calculateTotal() {
            const pickupDate = document.getElementById('pickupDate').value;
            const returnDate = document.getElementById('returnDate').value;
            const pricePerDay = parseFloat(document.getElementById('pricePerDay').value) || 0;

            if (pickupDate && returnDate && pricePerDay > 0) {
                const pickup = new Date(pickupDate);
                const returnD = new Date(returnDate);
                const diffTime = returnD - pickup;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays > 0) {
                    const total = diffDays * pricePerDay;
                    document.getElementById('totalAmount').textContent =
                        `$${total.toFixed(2)}`;
                    document.getElementById('daysInfo').textContent =
                        `${diffDays} day${diffDays > 1 ? 's' : ''} rental`;
                    document.getElementById('priceInfo').style.display = 'block';
                } else {
                    document.getElementById('priceInfo').style.display = 'none';
                }
            }
        }

        // Add event listeners for price calculation
        document.getElementById('pickupDate').addEventListener('change', calculateTotal);
        document.getElementById('returnDate').addEventListener('change', calculateTotal);
        document.getElementById('pricePerDay').addEventListener('input', calculateTotal);

        // Update return date minimum when pickup date changes
        document.getElementById('pickupDate').addEventListener('change', function () {
            const pickupDate = this.value;
            if (pickupDate) {
                const nextDay = new Date(pickupDate);
                nextDay.setDate(nextDay.getDate() + 1);
                document.getElementById('returnDate').setAttribute('min',
                    nextDay.toISOString().split('T')[0]);
            }
        });

        // Show alert message
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Hide after 5 seconds
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        // Handle form submission
        document.getElementById('bookingForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            // Show loading spinner
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('alertBox').style.display = 'none';

            // Collect form data
            const formData = {
                vehicleId: parseInt(document.getElementById('vehicleId').value),
                vehicleName: document.getElementById('vehicleName').value,
                customerName: document.getElementById('customerName').value,
                customerEmail: document.getElementById('customerEmail').value,
                customerPhone: document.getElementById('customerPhone').value,
                licenseNumber: document.getElementById('licenseNumber').value,
                pickupDate: document.getElementById('pickupDate').value,
                returnDate: document.getElementById('returnDate').value,
                pickupLocation: document.getElementById('pickupLocation').value,
                returnLocation: document.getElementById('returnLocation').value,
                pricePerDay: parseFloat(document.getElementById('pricePerDay').value),
                specialRequests: document.getElementById('specialRequests').value || null,
                status: 'PENDING'
            };

            try {
                // Send POST request to API
                const response = await fetch('http://localhost:8081/api/bookings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                // Hide loading spinner
                document.getElementById('loadingSpinner').style.display = 'none';

                if (response.ok) {
                    showAlert(
                        `✓ Booking created successfully! Booking ID: ${data.id}. ` +
                        `Total Amount: $${data.totalAmount}`,
                        'success'
                    );
                    // Reset form after successful submission
                    setTimeout(() => {
                        this.reset();
                        document.getElementById('priceInfo').style.display = 'none';
                    }, 2000);
                } else {
                    showAlert(
                        `✗ Error: ${data.error || 'Failed to create booking'}`,
                        'error'
                    );
                }
            } catch (error) {
                document.getElementById('loadingSpinner').style.display = 'none';
                showAlert(
                    '✗ Network error: Unable to connect to the server. Please try again.',
                    'error'
                );
                console.error('Error:', error);
            }
        });

        // Reset price info when form is reset
        document.getElementById('bookingForm').addEventListener('reset', function () {
            document.getElementById('priceInfo').style.display = 'none';
            document.getElementById('alertBox').style.display = 'none';
        });
    </script>
</body>

</html>
